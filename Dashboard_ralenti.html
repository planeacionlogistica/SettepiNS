<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ralentí | Traxión</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Inter',sans-serif;background:#f0f2f7;color:#1a2236}

/* ================= NAV ================= */
nav{
  background:#1f2937;
  padding:12px 20px;
  display:flex;
  align-items:center;
  gap:14px;
  position:sticky;
  top:0;
  z-index:300;
  flex-wrap:wrap;
}
nav>a{
  color:#e5e7eb;
  text-decoration:none;
  font-weight:700;
}
nav>a:first-child{
  color:#84cc16;
  font-size:18px;
}

/* filtro btn mobile */
#btnFilters{
  display:none;
  background:#374151;
  color:#e5e7eb;
  border:none;
  border-radius:8px;
  padding:8px 14px;
  font-weight:600;
  cursor:pointer;
}

/* ================= LAYOUT ================= */
.layout{
  display:flex;
}
.sidebar{
  width:180px;
  background:#fff;
  border-right:1px solid #dde3f0;
  padding:.6rem;
  position:sticky;
  top:55px;
  height:calc(100vh - 55px);
  overflow-y:auto;
  transition:max-height .3s ease;
}
.main{
  flex:1;
  padding:1rem;
}

/* ================= KPI ================= */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1rem;
}
.kpi{
  background:#fff;
  border-radius:12px;
  padding:1rem;
  border-top:4px solid var(--kc,#7ed321);
}
.kpi-val{
  font-size:1.8rem;
  font-weight:700;
  color:var(--kc,#7ed321);
}
.kpi-lbl{
  font-size:.65rem;
  text-transform:uppercase;
  color:#6b7a99;
}

/* ================= CARD / CHART ================= */
.chart-card{
  background:#fff;
  border-radius:12px;
  padding:1rem;
  margin-top:1rem;
}
.chart-wrap{
  height:300px;
}

/* ================= TABLE ================= */
.table-card{
  background:#fff;
  border-radius:12px;
  margin-top:1rem;
  overflow:hidden;
}
.data-table{
  width:100%;
  border-collapse:collapse;
}
.data-table th{
  background:#222d42;
  color:#fff;
  font-size:.65rem;
  padding:.4rem;
}
.data-table td{
  padding:.4rem;
  font-size:.75rem;
}

/* ================= MODAL ================= */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:900;
  align-items:center;
  justify-content:center;
}
.modal-overlay.open{
  display:flex;
}
.modal-box{
  background:#fff;
  width:95%;
  max-width:980px;
  max-height:85vh;
  border-radius:14px;
  overflow:hidden;
}

/* ================= MOBILE ================= */
@media(max-width:768px){

  #btnFilters{display:inline-block}

  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    max-height:0;
    overflow:hidden;
    border-right:none;
    border-bottom:1px solid #dde3f0;
    position:relative;
    top:0;
  }

  .sidebar.open{
    max-height:70vh;
    overflow-y:auto;
  }

  .kpi-grid{
    grid-template-columns:1fr 1fr;
  }

  .kpi-val{
    font-size:1.4rem;
  }

  .chart-wrap{
    height:220px;
  }

  .data-table{
    min-width:650px;
  }

  .modal-box{
    max-height:90vh;
  }
}
</style>
</head>

<body>

<nav>
  <a href="index.html">TRAXIÓN</a>
  <button id="btnFilters">☰ Filtros</button>
</nav>

<div class="layout">
  <aside class="sidebar">
    <!-- AQUÍ VA TU SIDEBAR ORIGINAL DE FILTROS (SIN CAMBIOS) -->
    <p style="font-size:.7rem;color:#6b7a99">Filtros activos</p>
  </aside>

  <main class="main">
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi" style="--kc:#0891b2"><div class="kpi-val">120h</div><div class="kpi-lbl">Horas</div></div>
      <div class="kpi"><div class="kpi-val">340</div><div class="kpi-lbl">Eventos</div></div>
      <div class="kpi"><div class="kpi-val">240 L</div><div class="kpi-lbl">Litros</div></div>
      <div class="kpi" style="--kc:#e53e3e"><div class="kpi-val">$18,000</div><div class="kpi-lbl">Costo</div></div>
    </div>

    <!-- Chart -->
    <div class="chart-card">
      <div class="chart-wrap">
        <canvas></canvas>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr><th>Unidad</th><th>Horas</th><th>Km</th></tr>
          </thead>
          <tbody>
            <tr><td>TX‑101</td><td>12h</td><td>48</td></tr>
            <tr><td>TX‑202</td><td>9h</td><td>30</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ================= JS MOBILE ================= -->
<script>
const btn=document.getElementById('btnFilters');
const sidebar=document.querySelector('.sidebar');

btn.addEventListener('click',()=>sidebar.classList.toggle('open'));

window.addEventListener('resize',()=>{
  if(window.innerWidth>768){
    sidebar.classList.remove('open');
  }
});
</script>

</body>
</html>
