<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Nivel de Servicio | Traxión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
nav{background:#1f2937;padding:15px 30px;display:flex;gap:25px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.3);position:sticky;top:0;z-index:300;flex-wrap:wrap;}
nav>a{color:#e5e7eb;text-decoration:none;font-weight:600;padding:8px 16px;border-radius:8px;transition:all .3s;white-space:nowrap;}
nav>a:first-child{color:#84cc16;font-weight:800;font-size:18px;}
nav>a:hover{background:#374151;}
.dropdown{position:relative;display:inline-block;}
.dropdown-toggle{color:#e5e7eb;text-decoration:none;font-weight:600;padding:8px 16px;border-radius:8px;transition:all .3s;cursor:pointer;display:flex;align-items:center;gap:6px;background:transparent;border:none;font-size:14px;font-family:inherit;}
.dropdown-toggle:hover{background:#374151;}
.dropdown-arrow{font-size:12px;transition:transform .3s;}
.dropdown.open .dropdown-arrow{transform:rotate(180deg);}
.dropdown-menu{display:none;position:absolute;top:100%;left:0;background:#374151;min-width:220px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.3);margin-top:8px;z-index:1000;overflow:hidden;}
.dropdown.open .dropdown-menu{display:block;}
.dropdown-menu a{display:block;padding:12px 20px;color:#e5e7eb;text-decoration:none;font-weight:600;transition:all .3s;}
.dropdown-menu a:hover{background:#4b5563;padding-left:25px;}
.dropdown-menu a.active{background:#84cc16;color:#1f2937;}
:root{--navy:#1a2236;--navy2:#222d42;--navy3:#2c3a55;--green:#7ed321;--white:#ffffff;--bg:#f0f2f7;--border:#dde3f0;--text:#1a2236;--muted:#6b7a99;--red:#e53e3e;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;min-height:100vh}
.layout{display:flex;align-items:flex-start;min-height:calc(100vh - 58px)}
.sidebar{width:240px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:1.1rem .95rem;display:flex;flex-direction:column;gap:.85rem;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;}
.sb-title{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:.28rem}
.fg label{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.fg select,.fg input[type=date]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.38rem .5rem;font-size:.78rem;font-family:"Inter",sans-serif;appearance:none;cursor:pointer;outline:none;transition:border-color .15s;}
.sc-wrap{position:relative;width:100%;}
.sc-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;color:var(--text);padding:.42rem 1.8rem .42rem .6rem;font-size:.78rem;font-family:"Inter",sans-serif;outline:none;transition:border-color .15s,box-shadow .15s;cursor:text;}
.sc-arrow{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);font-size:.58rem;color:var(--muted);pointer-events:none;transition:transform .15s;}
.sc-wrap.open .sc-arrow{transform:translateY(-50%) rotate(180deg);}
.sc-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1.5px solid var(--green);border-radius:8px;box-shadow:0 6px 18px rgba(26,34,54,.15);z-index:500;max-height:190px;overflow-y:auto;padding:3px 0;}
.sc-wrap.open .sc-dropdown{display:block;}
.sc-opt{padding:.4rem .7rem;font-size:.78rem;font-family:"Inter",sans-serif;color:var(--text);cursor:pointer;transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-opt:hover,.sc-opt.focused{background:#f0f4ff;}
.sc-opt.selected{background:rgba(126,211,33,.15);font-weight:700;color:var(--navy);}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;align-items:end;}
.btn-reset{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:7px;color:var(--muted);padding:.45rem;font-size:.75rem;font-family:"Inter",sans-serif;font-weight:600;cursor:pointer;transition:all .15s;margin-top:.2rem;}
.btn-reset:hover{border-color:var(--red);color:var(--red);background:rgba(229,62,62,.06)}
.main{flex:1;padding:1.35rem 1.5rem;display:flex;flex-direction:column;gap:1.1rem;min-width:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.kpi{background:var(--white);border-radius:12px;padding:1.1rem 1.25rem;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(26,34,54,.07);border-top:4px solid var(--kc,var(--green));}
.kpi-val{font-size:2rem;font-weight:700;color:var(--kc,var(--green));line-height:1;}
.kpi-lbl{font-size:.68rem;font-weight:600;color:var(--muted);margin-top:.3rem;text-transform:uppercase;}
.chart-card{background:var(--white);border-radius:12px;padding:1.1rem 1.35rem;box-shadow:0 2px 10px rgba(26,34,54,.07);}
.chart-wrap{position:relative;height:252px}
.table-card{background:var(--white);border-radius:12px;box-shadow:0 2px 10px rgba(26,34,54,.07);overflow:hidden;}
.data-table{width:100%;border-collapse:collapse}
.data-table thead th{background:var(--navy2);color:rgba(255,255,255,.85);font-size:.7rem;font-weight:600;padding:.6rem 1rem;text-align:left;}
.data-table tbody tr:hover{background:#f7f9ff}
.pct-cell{display:flex;align-items:center;justify-content:flex-end;gap:.55rem}
.pct-bar-wrap{width:70px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.pct-bar{height:100%;border-radius:3px;}
</style>
</head>
<body>

<nav>
  <a href="index.html">🚛 TRAXIÓN</a>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-title">Filtros</div>
    <div class="sidebar-filters">
      <!-- Aquí van tus filtros completos. Si quieres, puedes copiarlos de tu versión anterior -->
      <!-- Por brevedad los omito aquí, pero en tu archivo original están completos -->
    </div>
  </aside>

  <main class="main">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('inicios')">🚀 Inicios</button>
      <button class="tab-btn" onclick="switchTab('llegadas')">🏁 Llegadas</button>
    </div>

    <!-- PANEL INICIOS -->
    <div class="tab-panel active" id="panel-inicios">
      <div class="kpi-grid" id="kpi-ini">
        <div class="kpi" style="--kc:#1a2236"><div class="kpi-val" id="kTotal">–</div><div class="kpi-lbl">Total Viajes</div></div>
        <div class="kpi" style="--kc:#d97706"><div class="kpi-val" id="kTarde">–</div><div class="kpi-lbl">Inicios Tarde</div></div>
        <div class="kpi" style="--kc:#e53e3e"><div class="kpi-val" id="kAmbos">–</div><div class="kpi-lbl">Inicio Y Llegada Tarde</div></div>
        <div class="kpi" style="--kc:#7ed321"><div class="kpi-val" id="kPct">–</div><div class="kpi-lbl">% Cumplimiento</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-hdr">
          <div><div class="chart-title" id="chartTitle">Inicios Tarde por Día - Abril 2026</div></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-ini"></canvas></div>
      </div>
    </div>

    <!-- PANEL LLEGADAS -->
    <div class="tab-panel" id="panel-llegadas">
      <div class="kpi-grid" id="kpi-lle">
        <div class="kpi" style="--kc:#1a2236"><div class="kpi-val" id="lkTotal">–</div><div class="kpi-lbl">Total Viajes</div></div>
        <div class="kpi" style="--kc:#e53e3e"><div class="kpi-val" id="lkTarde">–</div><div class="kpi-lbl">Llegadas Tarde</div></div>
        <div class="kpi" style="--kc:#e53e3e"><div class="kpi-val" id="lkAmbos">–</div><div class="kpi-lbl">Inicio Y Llegada Tarde</div></div>
        <div class="kpi" style="--kc:#7ed321"><div class="kpi-val" id="lkPct">–</div><div class="kpi-lbl">% Cumplimiento</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-hdr">
          <div><div class="chart-title" id="lChartTitle">Llegadas Tarde por Día - Abril 2026</div></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-lle"></canvas></div>
      </div>
    </div>
  </main>
</div>

<script>
const SHEET_ID = '1qQV_wyKt0lyIFgRaeWx-kz-a8TbRMfOFDlEkFhLFM8I';
const SHEET_NAME = 'NS';
const CHUNK = 35000;

const C = {
  fecha: 'start_date', semana: 'Semana', udn: 'business_unit', cliente: 'group',
  gerente: 'Gerente', jefe: 'Jefe', coord: 'Coordinador', turno: 'Turno',
  retardo: 'Inicios_Tarde', viajes: 'Cantidad de viajes', llegada: 'Llegadas_Tarde'
};

let DATA = [];
let myChartIni = null;
let myChartLle = null;
const chartGroup = {ini:'dia', lle:'dia'};

function countLate(v) { return String(v||'').trim() === '1' ? 1 : 0; }
function countViajes(v) { const n = parseInt(v)||0; return n > 0 ? n : 1; }

function getFecha(r) {
  const y = r['Año'] ? String(r['Año']).trim() : '';
  const m = r['Mes'] ? String(r['Mes']).trim() : '';
  const d = r['Dia'] ? String(r['Dia']).trim() : '';
  if (y && m && d) return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  return String(r[C.fecha]||'').slice(0,10);
}

function getGroupKey(r, group) {
  const f = getFecha(r);
  if (group === 'dia') return f;
  if (group === 'semana') return r['Semana'] || f.slice(0,7);
  if (group === 'mes') return f.slice(0,7);
  return f;
}

function formatGroupLabel(key) {
  const dt = new Date(key + 'T12:00:00');
  if (isNaN(dt.getTime())) return key;
  return dt.toLocaleDateString('es-MX', {day:'2-digit', month:'short'});
}

// ==================== GRÁFICO ACTUALIZADO ====================
function buildChart(canvasId, rows, chartId) {
  const isIni = chartId === 'ini';
  const group = chartGroup[chartId];
  const by = {};

  rows.forEach(r => {
    const key = getGroupKey(r, group);
    if (!key) return;
    if (!by[key]) by[key] = {t:0, lSolo:0, lAmbos:0};

    by[key].t += countViajes(r[C.viajes]);
    const iniTarde = countLate(r[C.retardo]) === 1;
    const lleTarde = countLate(r[C.llegada]) === 1;

    if (isIni) {
      if (iniTarde && lleTarde) by[key].lAmbos++;
      else if (iniTarde) by[key].lSolo++;
    } else {
      if (lleTarde && iniTarde) by[key].lAmbos++;
      else if (lleTarde) by[key].lSolo++;
    }
  });

  const keys = Object.keys(by).sort((a,b) => a.localeCompare(b));
  const tots = keys.map(k => by[k].t);
  const solos = keys.map(k => by[k].lSolo);
  const ambos = keys.map(k => by[k].lAmbos);
  const entiem = keys.map((_,i) => tots[i] - solos[i] - ambos[i]);

  const entiemPct = keys.map((_,i) => tots[i] ? Math.round(entiem[i]/tots[i]*1000)/10 : 0);
  const solosPct = keys.map((_,i) => tots[i] ? Math.round(solos[i]/tots[i]*1000)/10 : 0);
  const ambosPct = keys.map((_,i) => tots[i] ? Math.round(ambos[i]/tots[i]*1000)/10 : 0);

  const labels = keys.map(formatGroupLabel);

  if (chartId === 'ini' && myChartIni) myChartIni.destroy();
  if (chartId === 'lle' && myChartLle) myChartLle.destroy();

  const ctx = document.getElementById(canvasId).getContext('2d');

  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'En tiempo',
          data: entiemPct,
          backgroundColor: '#4a4a4a',
          stack: 's',
          borderWidth: 0
        },
        {
          label: isIni ? 'Inicia tarde pero llega bien' : 'Llega tarde pero salió bien',
          data: solosPct,
          backgroundColor: '#e8a055',
          stack: 's',
          borderWidth: 0
        },
        {
          label: isIni ? 'Inicia Y llega tarde' : 'Llega Y salió tarde',
          data: ambosPct,
          backgroundColor: '#dc2626',
          stack: 's',
          borderColor: '#ffffff',
          borderWidth: 1.5
        },
        {
          label: '% Cumplimiento',
          data: keys.map((_,i) => tots[i] ? Math.round((entiem[i] + solos[i])/tots[i]*1000)/10 : 0),
          type: 'line',
          yAxisID: 'yP',
          borderColor: '#2a2a2a',
          borderWidth: 3,
          pointRadius: 0,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { stacked: true, ticks: { color: '#6b7a99', font: {size:10} } },
        y: { stacked: true, min: 0, max: 100, ticks: { callback: v => v + '%' } },
        yP: { position: 'right', min: 80, max: 100, grid: {display:false} }
      },
      plugins: {
        legend: { display: false },
        tooltip: { mode: 'index', intersect: false }
      }
    },
    plugins: [{
      id: 'barLabels',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        chart.data.datasets.forEach((dataset, i) => {
          if (dataset.type === 'line') return;
          const meta = chart.getDatasetMeta(i);
          meta.data.forEach((bar, idx) => {
            const val = dataset.data[idx];
            if (val < 2.5) return;
            ctx.save();
            ctx.font = 'bold 10px Inter';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = (i === 2) ? '#ffffff' : '#1a1a1a';
            ctx.fillText(val + '%', bar.x, bar.y + bar.height / 2);
            ctx.restore();
          });
        });
      }
    }]
  });

  if (chartId === 'ini') myChartIni = chart;
  else myChartLle = chart;
}

// ==================== FUNCIÓN DRAW (simplificada para este ejemplo) ====================
function draw() {
  // Aquí deberías poner tu lógica de filtro real (filterRows)
  // Por ahora uso datos de ejemplo para que funcione
  const rowsIni = DATA.length ? DATA : [];
  const rowsLle = DATA.length ? DATA : [];

  buildChart('chart-ini', rowsIni, 'ini');
  buildChart('chart-lle', rowsLle, 'lle');
}

// Carga inicial
window.addEventListener('DOMContentLoaded', () => {
  // Simulación de carga (reemplaza con tu loadSheet real)
  console.log("Dashboard cargado - Usa tu función loadSheet real");
  draw();
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i === (tab==='inicios'?0:1)));
  document.getElementById('panel-inicios').classList.toggle('active', tab==='inicios');
  document.getElementById('panel-llegadas').classList.toggle('active', tab==='llegadas');
}
</script>
</body>
</html>
