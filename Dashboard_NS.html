<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Nivel de Servicio | Traxión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* CSS original tuyo (mantenido igual) */
nav{background:#1f2937;padding:15px 30px;display:flex;gap:25px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.3);position:sticky;top:0;z-index:300;}
nav>a{color:#e5e7eb;text-decoration:none;font-weight:600;padding:8px 16px;border-radius:8px;}
nav>a:first-child{color:#84cc16;font-weight:800;font-size:18px;}
body{background:#f0f2f7;font-family:"Inter",sans-serif;margin:0;}
.layout{display:flex;min-height:calc(100vh - 58px);}
.sidebar{width:240px;background:#fff;border-right:1px solid #dde3f0;padding:1rem;}
.main{flex:1;padding:1.5rem;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}
.kpi{background:#fff;border-radius:12px;padding:1.2rem;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.chart-card{background:#fff;border-radius:12px;padding:1.2rem;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:1.5rem;}
.chart-wrap{height:280px;position:relative;}
.tab-bar{display:flex;gap:0;border-bottom:2px solid #ddd;margin-bottom:1rem;}
.tab-btn{padding:0.8rem 1.5rem;font-weight:600;cursor:pointer;border:none;background:none;}
.tab-btn.active{border-bottom:3px solid #7ed321;color:#1a2236;}
</style>
</head>
<body>

<nav>
  <a href="#">🚛 TRAXIÓN</a>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-title">FILTROS</div>
    <!-- Aquí puedes poner tus filtros si quieres, pero por ahora los dejamos vacíos para que funcione -->
  </aside>

  <main class="main">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('inicios')">Inicios</button>
      <button class="tab-btn" onclick="switchTab('llegadas')">Llegadas</button>
    </div>

    <!-- === PANEL INICIOS === -->
    <div id="panel-inicios" class="tab-panel active">
      <div class="kpi-grid">
        <div class="kpi"><div id="kTotal" style="font-size:2rem;font-weight:700;">–</div><div>Total Viajes</div></div>
        <div class="kpi"><div id="kTarde" style="font-size:2rem;font-weight:700;color:#d97706;">–</div><div>Inicios Tarde</div></div>
        <div class="kpi"><div id="kAmbos" style="font-size:2rem;font-weight:700;color:#e53e3e;">–</div><div>Inicio y Llegada Tarde</div></div>
        <div class="kpi"><div id="kPct" style="font-size:2rem;font-weight:700;color:#7ed321;">–</div><div>% Cumplimiento</div></div>
      </div>

      <div class="chart-card">
        <h3 id="chartTitle">Inicios Tarde por Día - Abril 2026</h3>
        <div class="chart-wrap"><canvas id="chart-ini"></canvas></div>
      </div>
    </div>

    <!-- === PANEL LLEGADAS === -->
    <div id="panel-llegadas" class="tab-panel">
      <div class="kpi-grid">
        <div class="kpi"><div id="lkTotal" style="font-size:2rem;font-weight:700;">–</div><div>Total Viajes</div></div>
        <div class="kpi"><div id="lkTarde" style="font-size:2rem;font-weight:700;color:#e53e3e;">–</div><div>Llegadas Tarde</div></div>
        <div class="kpi"><div id="lkAmbos" style="font-size:2rem;font-weight:700;color:#e53e3e;">–</div><div>Inicio y Llegada Tarde</div></div>
        <div class="kpi"><div id="lkPct" style="font-size:2rem;font-weight:700;color:#7ed321;">–</div><div>% Cumplimiento</div></div>
      </div>

      <div class="chart-card">
        <h3 id="lChartTitle">Llegadas Tarde por Día - Abril 2026</h3>
        <div class="chart-wrap"><canvas id="chart-lle"></canvas></div>
      </div>
    </div>
  </main>
</div>

<script>
// ==================== DATOS Y CONFIGURACIÓN ====================
let myChartIni = null;
let myChartLle = null;
const chartGroup = {ini: 'dia', lle: 'dia'};

// Datos de ejemplo (reemplaza con tu loadSheet real cuando quieras)
const sampleData = [
  {start_date:"2026-04-01", Inicios_Tarde:"0", Llegadas_Tarde:"0", Cantidad_de_viajes:"100"},
  {start_date:"2026-04-02", Inicios_Tarde:"1", Llegadas_Tarde:"0", Cantidad_de_viajes:"95"},
  {start_date:"2026-04-03", Inicios_Tarde:"1", Llegadas_Tarde:"0", Cantidad_de_viajes:"98"},
  {start_date:"2026-04-13", Inicios_Tarde:"1", Llegadas_Tarde:"1", Cantidad_de_viajes:"92"}
  // Agrega más filas si quieres
];

function countLate(v) { return String(v||'').trim() === '1' ? 1 : 0; }
function countViajes(v) { return parseInt(v) || 1; }
function getFecha(r) { return String(r.start_date || '').slice(0,10); }

function getGroupKey(r, group) {
  const f = getFecha(r);
  return group === 'dia' ? f : f.slice(0,7);
}

function formatGroupLabel(key) {
  const dt = new Date(key + 'T12:00:00');
  return isNaN(dt.getTime()) ? key : dt.toLocaleDateString('es-MX', {day:'2-digit', month:'short'});
}

// ==================== GRÁFICO MEJORADO (INICIOS Y LLEGADAS) ====================
function buildChart(canvasId, rows, chartId) {
  const isIni = chartId === 'ini';
  const group = chartGroup[chartId];
  const by = {};

  rows.forEach(r => {
    const key = getGroupKey(r, group);
    if (!by[key]) by[key] = {t:0, lSolo:0, lAmbos:0};

    by[key].t += countViajes(r.Cantidad_de_viajes || r['Cantidad de viajes']);
    const iniTarde = countLate(r.Inicios_Tarde) === 1;
    const lleTarde = countLate(r.Llegadas_Tarde) === 1;

    if (isIni) {
      if (iniTarde && lleTarde) by[key].lAmbos++;
      else if (iniTarde) by[key].lSolo++;
    } else {
      if (lleTarde && iniTarde) by[key].lAmbos++;
      else if (lleTarde) by[key].lSolo++;
    }
  });

  const keys = Object.keys(by).sort((a,b) => a.localeCompare(b));
  const tots = keys.map(k => by[k].t);
  const solos = keys.map(k => by[k].lSolo);
  const ambos = keys.map(k => by[k].lAmbos);
  const entiem = keys.map((_,i) => tots[i] - solos[i] - ambos[i]);

  const entiemPct = keys.map((_,i) => tots[i] ? Math.round(entiem[i]/tots[i]*1000)/10 : 0);
  const solosPct = keys.map((_,i) => tots[i] ? Math.round(solos[i]/tots[i]*1000)/10 : 0);
  const ambosPct = keys.map((_,i) => tots[i] ? Math.round(ambos[i]/tots[i]*1000)/10 : 0);

  const labels = keys.map(formatGroupLabel);

  // Destruir gráfico anterior
  if (chartId === 'ini' && myChartIni) myChartIni.destroy();
  if (chartId === 'lle' && myChartLle) myChartLle.destroy();

  const ctx = document.getElementById(canvasId).getContext('2d');

  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: 'En tiempo', data: entiemPct, backgroundColor: '#4a4a4a', stack: 's' },
        { label: isIni ? 'Inicia tarde pero llega bien' : 'Llega tarde pero salió bien', data: solosPct, backgroundColor: '#e8a055', stack: 's' },
        { label: isIni ? 'Inicia Y llega tarde' : 'Llega Y salió tarde', data: ambosPct, backgroundColor: '#dc2626', stack: 's', borderColor: '#ffffff', borderWidth: 2 },
        { label: '% Cumplimiento', data: keys.map((_,i) => tots[i] ? Math.round((entiem[i]+solos[i])/tots[i]*1000)/10 : 0), type: 'line', yAxisID: 'yP', borderColor: '#2a2a2a', borderWidth: 3, pointRadius: 0 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { stacked: true },
        y: { stacked: true, min: 0, max: 100, ticks: { callback: v => v + '%' } },
        yP: { position: 'right', min: 80, max: 100, grid: { display: false } }
      },
      plugins: { legend: { display: false } }
    },
    plugins: [{
      id: 'percentageLabels',
      afterDatasetsDraw: function(chart) {
        const ctx = chart.ctx;
        chart.data.datasets.forEach((ds, i) => {
          if (ds.type === 'line') return;
          const meta = chart.getDatasetMeta(i);
          meta.data.forEach((bar, idx) => {
            const val = ds.data[idx];
            if (val < 3) return;
            ctx.save();
            ctx.font = 'bold 10px Inter';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = (i === 2) ? '#fff' : '#1a1a1a';
            ctx.fillText(val + '%', bar.x, bar.y + bar.height/2);
            ctx.restore();
          });
        });
      }
    }]
  });

  if (chartId === 'ini') myChartIni = chart;
  else myChartLle = chart;
}

// ==================== DRAW ====================
function draw() {
  const rows = sampleData;   // ← Cambia esto por tus datos reales cuando cargues el sheet
  buildChart('chart-ini', rows, 'ini');
  buildChart('chart-lle', rows, 'lle');
}

function switchTab(tab) {
  document.getElementById('panel-inicios').classList.toggle('active', tab === 'inicios');
  document.getElementById('panel-llegadas').classList.toggle('active', tab === 'llegadas');
}

// Cargar al iniciar
window.addEventListener('DOMContentLoaded', draw);
</script>
</body>
</html>
