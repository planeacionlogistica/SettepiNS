<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Nivel de Servicio | Traxión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
nav{background:#1f2937;padding:15px 30px;display:flex;gap:25px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.3);position:sticky;top:0;z-index:300;flex-wrap:wrap;}
nav>a{color:#e5e7eb;text-decoration:none;font-weight:600;padding:8px 16px;border-radius:8px;transition:all .3s;white-space:nowrap;}
nav>a:first-child{color:#84cc16;font-weight:800;font-size:18px;}
nav>a:hover{background:#374151;}
.dropdown{position:relative;display:inline-block;}
.dropdown-toggle{color:#e5e7eb;text-decoration:none;font-weight:600;padding:8px 16px;border-radius:8px;transition:all .3s;cursor:pointer;display:flex;align-items:center;gap:6px;background:transparent;border:none;font-size:14px;font-family:inherit;}
.dropdown-toggle:hover{background:#374151;}
.dropdown-arrow{font-size:12px;transition:transform .3s;}
.dropdown.open .dropdown-arrow{transform:rotate(180deg);}
.dropdown-menu{display:none;position:absolute;top:100%;left:0;background:#374151;min-width:220px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.3);margin-top:8px;z-index:1000;overflow:hidden;}
.dropdown.open .dropdown-menu{display:block;}
.dropdown-menu a{display:block;padding:12px 20px;color:#e5e7eb;text-decoration:none;font-weight:600;transition:all .3s;}
.dropdown-menu a:hover{background:#4b5563;padding-left:25px;}
.dropdown-menu a.active{background:#84cc16;color:#1f2937;}
:root{--navy:#1a2236;--navy2:#222d42;--navy3:#2c3a55;--green:#7ed321;--green2:#5cb800;--green3:#a8e05f;--white:#ffffff;--bg:#f0f2f7;--border:#dde3f0;--text:#1a2236;--muted:#6b7a99;--red:#e53e3e;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;min-height:100vh}
.layout{display:flex;align-items:flex-start;min-height:calc(100vh - 58px)}
.sidebar{width:240px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:1.1rem .95rem;display:flex;flex-direction:column;gap:.85rem;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;}
.sb-title{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:.28rem}
.fg label{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.fg select,.fg input[type=date]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.38rem .5rem;font-size:.78rem;font-family:"Inter",sans-serif;appearance:none;cursor:pointer;outline:none;transition:border-color .15s;}
.fg select:focus,.fg input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(126,211,33,.15)}
.sc-wrap{position:relative;width:100%;}
.sc-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;color:var(--text);padding:.42rem 1.8rem .42rem .6rem;font-size:.78rem;font-family:"Inter",sans-serif;outline:none;transition:border-color .15s,box-shadow .15s;cursor:text;}
.sc-input:focus,.sc-wrap.open .sc-input{border-color:var(--green);box-shadow:0 0 0 3px rgba(126,211,33,.13);}
.sc-arrow{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);font-size:.58rem;color:var(--muted);pointer-events:none;transition:transform .15s;}
.sc-wrap.open .sc-arrow{transform:translateY(-50%) rotate(180deg);}
.sc-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1.5px solid var(--green);border-radius:8px;box-shadow:0 6px 18px rgba(26,34,54,.15);z-index:500;max-height:190px;overflow-y:auto;padding:3px 0;}
.sc-wrap.open .sc-dropdown{display:block;}
.sc-opt{padding:.4rem .7rem;font-size:.78rem;font-family:"Inter",sans-serif;color:var(--text);cursor:pointer;transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-opt:hover,.sc-opt.focused{background:#f0f4ff;}
.sc-opt.selected{background:rgba(126,211,33,.15);font-weight:700;color:var(--navy);}
.sc-opt.sc-none{color:var(--muted);font-style:italic;cursor:default;}
.sc-opt.sc-none:hover{background:transparent;}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;align-items:end;}
.date-row .fg{gap:.2rem;}
.date-row input[type=date]{font-size:.72rem;padding:.35rem .4rem;}
.btn-reset{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:7px;color:var(--muted);padding:.45rem;font-size:.75rem;font-family:"Inter",sans-serif;font-weight:600;cursor:pointer;transition:all .15s;margin-top:.2rem;}
.btn-reset:hover{border-color:var(--red);color:var(--red);background:rgba(229,62,62,.06)}
.main{flex:1;padding:1.35rem 1.5rem;display:flex;flex-direction:column;gap:1.1rem;min-width:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.kpi{background:var(--white);border-radius:12px;padding:1.1rem 1.25rem;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(26,34,54,.07);border-top:4px solid var(--kc,var(--green));transition:transform .15s,box-shadow .2s;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,34,54,.12)}
.kpi::after{content:"";position:absolute;bottom:-18px;right:-18px;width:80px;height:80px;border-radius:50%;background:var(--kc,var(--green));opacity:.06}
.kpi-icon{font-size:1.3rem;margin-bottom:.4rem}
.kpi-val{font-size:2rem;font-weight:700;color:var(--kc,var(--green));line-height:1;letter-spacing:-.02em}
.kpi-lbl{font-size:.68rem;font-weight:600;color:var(--muted);margin-top:.3rem;text-transform:uppercase;letter-spacing:.05em;line-height:1.4}
.kpi-clickable{cursor:pointer;user-select:none;}
.kpi-clickable:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(26,34,54,.16);}
.kpi-clickable.kpi-active{outline:3px solid var(--kc,var(--green));outline-offset:2px;box-shadow:0 0 0 6px rgba(126,211,33,.15);}
.kpi-hint{font-size:.6rem;color:var(--muted);margin-top:.4rem;opacity:.7;letter-spacing:.03em;}
.kpi-active .kpi-hint{color:var(--kc,var(--green));opacity:1;font-weight:600;}
.chart-card{background:var(--white);border-radius:12px;padding:1.1rem 1.35rem;box-shadow:0 2px 10px rgba(26,34,54,.07);display:flex;flex-direction:column;gap:.7rem;}
.chart-hdr{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.chart-title{font-size:.95rem;font-weight:700;color:var(--text)}
.chart-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.chart-legend{display:flex;gap:1rem;align-items:center;flex-shrink:0}
.leg{display:flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:500;color:var(--muted)}
.leg-sq{width:10px;height:10px;border-radius:2px}
.leg-line{width:18px;height:2.5px;border-radius:1px}
.chart-wrap{position:relative;height:252px}
.tables-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;}
.table-card{background:var(--white);border-radius:12px;box-shadow:0 2px 10px rgba(26,34,54,.07);overflow:hidden;}
.table-hdr{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;border-bottom:1px solid var(--border);}
.table-hdr-title{font-size:.9rem;font-weight:700;color:var(--text)}
.table-hdr-icon{font-size:.9rem;margin-right:.35rem}
.table-hdr-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.table-count{font-size:.72rem;color:var(--muted);background:var(--bg);border-radius:20px;padding:.2rem .65rem;white-space:nowrap}
.data-table{width:100%;border-collapse:collapse}
.data-table thead th{background:var(--navy2);color:rgba(255,255,255,.85);font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.6rem 1rem;text-align:left;white-space:nowrap;}
.data-table thead th:nth-child(n+3){text-align:right}
.data-table tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
.data-table tbody tr:last-child{border-bottom:none}
.data-table tbody tr:hover{background:#f7f9ff}
.data-table tbody td{padding:.55rem 1rem;font-size:.8rem;color:var(--text)}
.data-table tbody td:nth-child(n+3){text-align:right;font-variant-numeric:tabular-nums}
.td-cli{font-weight:600}.td-num{color:var(--navy)}.td-late{color:var(--red);font-weight:600}
.pct-cell{display:flex;align-items:center;justify-content:flex-end;gap:.55rem}
.pct-bar-wrap{width:70px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.pct-bar{height:100%;border-radius:3px;transition:width .4s}
.pct-val{font-weight:700;font-size:.8rem;min-width:42px;text-align:right}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:.65rem;font-weight:700;flex-shrink:0;}
.table-empty{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.82rem}
.section-end{margin-bottom:.5rem}
.th-inner{display:flex;align-items:center;justify-content:space-between;gap:.3rem}
.th-inner span{flex:1}
.sort-btn{background:none;border:none;cursor:pointer;padding:0 3px;color:rgba(255,255,255,.4);font-size:.7rem;line-height:1;transition:color .15s;}
.sort-btn:hover{color:rgba(255,255,255,.9)}
.btn-capture{display:flex;align-items:center;gap:.3rem;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:.28rem .65rem;font-size:.7rem;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-capture:hover{border-color:var(--green);color:var(--green);background:rgba(126,211,33,.06)}
.table-hdr-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);background:var(--white);padding:0 1.5rem;margin-bottom:1.1rem;}
.tab-btn{padding:.65rem 1.4rem;font-size:.82rem;font-weight:600;color:var(--muted);background:transparent;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .15s;letter-spacing:.01em;display:flex;align-items:center;gap:.45rem;}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--green)}
.tab-panel{display:none;flex-direction:column;gap:1.1rem}
.tab-panel.active{display:flex}
</style>
</head>
<body>
<nav>
  <a href="index.html">🚛 TRAXIÓN</a>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-title">Filtros</div>
    <div class="sidebar-filters">
      <!-- Tus filtros completos van aquí (mantengo la estructura) -->
      <div class="fg"><label>Unidad de Negocio</label><div class="sc-wrap" id="sc-udn">...</div></div>
      <!-- ... resto de tus filtros ... -->
    </div>
  </aside>

  <main class="main">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('inicios')">🚀 Inicios</button>
      <button class="tab-btn" onclick="switchTab('llegadas')">🏁 Llegadas</button>
    </div>

    <!-- PANEL INICIOS -->
    <div class="tab-panel active" id="panel-inicios">
      <div class="kpi-grid" id="kpi-ini">
        <div class="kpi kpi-clickable" style="--kc:#1a2236" id="kpi-ini-total"><div class="kpi-icon">🚛</div><div class="kpi-val" id="kTotal">–</div><div class="kpi-lbl">Total Viajes</div></div>
        <div class="kpi kpi-clickable" style="--kc:#d97706" id="kpi-ini-tarde"><div class="kpi-icon">⏰</div><div class="kpi-val" id="kTarde">–</div><div class="kpi-lbl">Inicios Tarde</div></div>
        <div class="kpi kpi-clickable" style="--kc:#e53e3e" id="kpi-ini-ambos"><div class="kpi-icon">⚠️</div><div class="kpi-val" id="kAmbos">–</div><div class="kpi-lbl">Inicio Y Llegada Tarde</div></div>
        <div class="kpi kpi-clickable" style="--kc:#7ed321" id="kpi-ini-pct"><div class="kpi-icon">📊</div><div class="kpi-val" id="kPct">–</div><div class="kpi-lbl">% Cumplimiento</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-hdr">
          <div><div class="chart-title" id="chartTitle">Inicios Tarde por Día</div></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-ini"></canvas></div>
      </div>
      <!-- Tus tablas aquí (cliente, gerente, etc.) -->
    </div>

    <!-- PANEL LLEGADAS -->
    <div class="tab-panel" id="panel-llegadas">
      <div class="kpi-grid" id="kpi-lle">
        <div class="kpi kpi-clickable" style="--kc:#1a2236" id="kpi-lle-total"><div class="kpi-icon">🚛</div><div class="kpi-val" id="lkTotal">–</div><div class="kpi-lbl">Total Viajes</div></div>
        <div class="kpi kpi-clickable" style="--kc:#e53e3e" id="kpi-lle-tarde"><div class="kpi-icon">🏁</div><div class="kpi-val" id="lkTarde">–</div><div class="kpi-lbl">Llegadas Tarde</div></div>
        <div class="kpi kpi-clickable" style="--kc:#e53e3e" id="kpi-lle-ambos"><div class="kpi-icon">⚠️</div><div class="kpi-val" id="lkAmbos">–</div><div class="kpi-lbl">Inicio Y Llegada Tarde</div></div>
        <div class="kpi kpi-clickable" style="--kc:#7ed321" id="kpi-lle-pct"><div class="kpi-icon">📊</div><div class="kpi-val" id="lkPct">–</div><div class="kpi-lbl">% Cumplimiento</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-hdr">
          <div><div class="chart-title" id="lChartTitle">Llegadas Tarde por Día</div></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-lle"></canvas></div>
      </div>
    </div>
  </main>
</div>

<script>
// ==================== TU CÓDIGO ORIGINAL (mantengo todo) ====================
const SHEET_ID = '1qQV_wyKt0lyIFgRaeWx-kz-a8TbRMfOFDlEkFhLFM8I';
const SHEET_NAME = 'NS';
const CHUNK = 35000;

const C = {
  fecha: 'start_date', semana: 'Semana', udn: 'business_unit', cliente: 'group',
  gerente: 'Gerente', jefe: 'Jefe', coord: 'Coordinador', turno: 'Turno',
  retardo: 'Inicios_Tarde', viajes: 'Cantidad de viajes', llegada: 'Llegadas_Tarde',
  minIni: 'Minutos de Retraso', minLle: 'Minutos llegadas'
};

let DATA = [];
let myChartIni = null;
let myChartLle = null;
const chartGroup = {ini:'dia', lle:'dia'};

// Tus funciones originales (loadSheet, filterRows, etc.) se mantienen igual
// ... (no las toco)

// ==================== SOLO CAMBIO ESTA FUNCIÓN ====================
function buildChart(canvasId, rows, lateField, lateLbl, existing, chartId) {
  const isIni = chartId === 'ini';
  const group = chartGroup[chartId || 'ini'];
  const by = {};

  rows.forEach(r => {
    const key = getGroupKey(r, group);
    if (!key || key === '?') return;
    if (!by[key]) by[key] = {t:0, lSolo:0, lAmbos:0};

    by[key].t += countViajes(r[C.viajes]);
    const iniTarde = countLate(r[C.retardo]) === 1;
    const lleTarde = countLate(r[C.llegada]) === 1;

    if (isIni) {
      if (iniTarde && lleTarde) by[key].lAmbos++;
      else if (iniTarde) by[key].lSolo++;
    } else {
      if (lleTarde && iniTarde) by[key].lAmbos++;
      else if (lleTarde) by[key].lSolo++;
    }
  });

  const keys = Object.keys(by).sort((a,b) => a.localeCompare(b));
  const tots = keys.map(k => by[k].t);
  const solos = keys.map(k => by[k].lSolo);
  const ambos = keys.map(k => by[k].lAmbos);
  const entiem = keys.map((_,i) => tots[i] - solos[i] - ambos[i]);

  const entiemPct = keys.map((_,i) => tots[i] > 0 ? Math.round(entiem[i]/tots[i]*1000)/10 : 0);
  const solosPct = keys.map((_,i) => tots[i] > 0 ? Math.round(solos[i]/tots[i]*1000)/10 : 0);
  const ambosPct = keys.map((_,i) => tots[i] > 0 ? Math.round(ambos[i]/tots[i]*1000)/10 : 0);
  const pcts = keys.map((_,i) => tots[i] > 0 ? Math.round((tots[i]-solos[i]-ambos[i])/tots[i]*1000)/10 : 0);

  const labels = keys.map(k => formatGroupLabel(k, group));

  if (existing) existing.destroy();

  const ctx = document.getElementById(canvasId).getContext('2d');

  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {label:'En tiempo', data:entiemPct, backgroundColor:'#4a4a4a', stack:'s'},
        {label: isIni ? 'Inicia tarde · llega bien' : 'Llega tarde · salió bien', data:solosPct, backgroundColor:'#e8a055', stack:'s'},
        {label: isIni ? 'Inicia Y llega tarde' : 'Llega Y salió tarde', data:ambosPct, backgroundColor:'#dc2626', stack:'s', borderColor:'#ffffff', borderWidth:2},
        {label:'% Cumplimiento', data:pcts, type:'line', yAxisID:'yP', borderColor:'#2a2a2a', borderWidth:2.5, pointBackgroundColor:'#2a2a2a', pointBorderColor:'#fff', pointBorderWidth:2, pointRadius:4, tension:0.3}
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      scales: {
        x: {stacked:true},
        y: {stacked:true, min:0, max:100, ticks:{callback:v=>v+'%'}},
        yP: {position:'right', min:80, max:100, grid:{display:false}}
      },
      plugins: {legend:{display:false}}
    },
    plugins: [{
      id: 'barLabels',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        chart.data.datasets.forEach((dataset, i) => {
          if (dataset.type === 'line') return;
          const meta = chart.getDatasetMeta(i);
          meta.data.forEach((bar, idx) => {
            const val = dataset.data[idx];
            if (val < 3) return;
            ctx.save();
            ctx.font = 'bold 10px Inter';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = (i === 2) ? '#ffffff' : '#1a1a1a';
            ctx.fillText(val + '%', bar.x, bar.y + bar.height/2);
            ctx.restore();
          });
        });
      }
    }]
  });
}

// ==================== Resto de tu código original (draw, loadSheet, etc.) ====================
// Aquí va todo tu código original que tenías antes (loadSheet, filterRows, getF, draw, etc.)
// No lo modifiqué

// Al final de tu función draw(), asegúrate de tener:
myChartIni = buildChart('chart-ini', rowsIni, C.retardo, 'Inicios tarde', myChartIni, 'ini');
myChartLle = buildChart('chart-lle', rowsLle, C.llegada, 'Llegadas tarde', myChartLle, 'lle');

</script>
</body>
